# Mewati Institute of Technology - Online Examination Platform
#
# Brings up Django backend, Postgres, Redis, Celery worker, Celery beat,
# and the React frontend served by Nginx behind a single port (80).

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: mit_exam
      POSTGRES_USER: mit_user
      POSTGRES_PASSWORD: mit_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mit_user -d mit_exam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://mit_user:mit_password@postgres:5432/mit_exam
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ALLOWED_HOSTS: "*"
      DEBUG: "False"
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"

  celery-worker:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://mit_user:mit_password@postgres:5432/mit_exam
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    command: celery -A config worker --loglevel=info --concurrency=4

  celery-beat:
    build: ./backend
    restart: always
    env_file: ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DATABASE_URL: postgres://mit_user:mit_password@postgres:5432/mit_exam
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    command: celery -A config beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""  # nginx proxies /api/ to backend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  media_data:
  static_data:
